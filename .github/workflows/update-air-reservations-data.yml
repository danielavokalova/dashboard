name: Update Air Reservations Data

on:
  workflow_dispatch:
    inputs:
      csv_url:
        description: "Public CSV URL. When empty, repository variable AIR_RESERVATIONS_CSV_URL is used."
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CSV
        shell: pwsh
        env:
          INPUT_CSV_URL: ${{ inputs.csv_url }}
          DEFAULT_CSV_URL: ${{ vars.AIR_RESERVATIONS_CSV_URL }}
        run: |
          $url = if ($env:INPUT_CSV_URL) { $env:INPUT_CSV_URL } else { $env:DEFAULT_CSV_URL }
          if (-not $url) {
            throw "Missing CSV URL. Add repository variable AIR_RESERVATIONS_CSV_URL or fill csv_url when running this workflow."
          }
          Invoke-WebRequest -Uri $url -OutFile air-reservations.csv
          $firstLine = Get-Content air-reservations.csv -TotalCount 1
          if ($firstLine -notmatch "Reservation|Connector|Locator|Status") {
            throw "Downloaded file does not look like the Air Reservations CSV."
          }

      - name: Commit and push when changed
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add air-reservations.csv
          $changed = git status --porcelain -- air-reservations.csv
          if (-not $changed) {
            Write-Host "No data changes."
            exit 0
          }
          git commit -m "Update air reservations data"
          git push
