<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Reservations</title>
<style>
:root {
  --ink:       #1f2a2a;
  --muted:     #4f6a6c;
  --line:      #425c5e;
  --paper:     rgba(245,246,244,0.95);
  --shadow:    rgba(90,115,115,0.26);
  --border:    rgba(66,92,94,0.17);
  --row-hover: rgba(79,106,108,0.07);
  --row-alt:   rgba(245,246,244,0.55);
  --bar-fill:  #4f6a6c;
  --bar-bg:    rgba(79,106,108,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  font-family: "Segoe UI", system-ui, sans-serif;
  background: url("botanicus.png") repeat;
  color: var(--ink);
}

/* ── TOPBAR ─────────────────────────────────────────────── */
.topbar {
  background: var(--paper);
  border-bottom: 2px solid var(--line);
  padding: 12px 40px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(6px);
}

.btn-back {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border: 1.5px solid var(--line);
  border-radius: 10px;
  background: transparent;
  color: var(--muted);
  font: 700 11px/1 inherit;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  text-decoration: none;
  transition: background 0.18s, color 0.18s;
}
.btn-back:hover { background: var(--muted); color: #fff; }

.topbar-title {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.22em;
}

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

.topbar-meta {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  line-height: 1.55;
}

.btn-sm {
  padding: 6px 14px;
  border: none;
  border-radius: 9px;
  font: 700 11px/1 inherit;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
}
.btn-sm:hover    { opacity: 0.82; transform: translateY(-1px); }
.btn-sm:disabled { opacity: 0.38; cursor: wait; transform: none; }
.btn-primary { background: var(--muted); color: #fff; }
.btn-outline  {
  background: transparent;
  color: var(--muted);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { background: rgba(79,106,108,0.1); }

/* ── MAIN ───────────────────────────────────────────────── */
.main {
  padding: 28px 40px 52px;
  max-width: 1920px;
  margin: 0 auto;
}

.error-box {
  display: none;
  background: rgba(160,30,30,0.07);
  border: 1.5px solid rgba(160,30,30,0.22);
  border-radius: 12px;
  padding: 13px 18px;
  color: #7a1a1a;
  font-size: 13px;
  margin-bottom: 20px;
}
.error-box.show { display: block; }

/* ── KPI CARDS ──────────────────────────────────────────── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 14px;
  margin-bottom: 18px;
}
@media (max-width: 1100px) { .kpi-row { grid-template-columns: repeat(3, 1fr); } }

.kpi {
  background: var(--paper);
  border-radius: 16px;
  padding: 16px 18px;
  box-shadow: 0 5px 20px var(--shadow);
}
.kpi.kpi-accent { border-left: 3px solid var(--bar-fill); }

.kpi-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.kpi-value { font-size: 26px; font-weight: 800; line-height: 1; }
.kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 5px; }

/* ── DATE RANGE QUICK BUTTONS ────────────────────────────── */
.date-range-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.range-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 4px;
}
.btn-range {
  padding: 5px 13px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--muted);
  font: 700 11px/1 inherit;
  letter-spacing: 0.07em;
  cursor: pointer;
  transition: background 0.14s, border-color 0.14s, color 0.14s;
}
.btn-range:hover   { background: rgba(79,106,108,0.08); }
.btn-range.active  { background: var(--muted); color: #fff; border-color: var(--muted); }

/* ── CHART LEGEND ────────────────────────────────────────── */
.chart-legend {
  display: flex;
  gap: 16px;
  margin-left: auto;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--muted);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── CHART SECTION ──────────────────────────────────────── */
.chart-section {
  background: var(--paper);
  border-radius: 16px;
  padding: 20px 24px;
  box-shadow: 0 5px 20px var(--shadow);
  margin-bottom: 18px;
  display: none;
}

.chart-section.visible { display: block; }

.chart-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.chart-title {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
}

.chart-toggle {
  margin-left: auto;
  font-size: 11px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  padding: 2px 8px;
  border-radius: 6px;
  transition: background 0.15s;
}
.chart-toggle:hover { background: rgba(79,106,108,0.1); }

.chart-body { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 32px; }
@media (max-width: 900px) { .chart-body { grid-template-columns: 1fr; } }

/* ── MONTHLY TREND ──────────────────────────────────────── */
.monthly-wrap {
  overflow-x: auto;
  padding-bottom: 4px;
}
.monthly-bars {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 130px;
  min-width: max-content;
  padding-bottom: 24px;
  box-sizing: content-box;
}
.month-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  min-width: 38px;
}
.month-pair {
  display: flex;
  align-items: flex-end;
  gap: 2px;
}
.month-bar {
  width: 14px;
  border-radius: 3px 3px 0 0;
  transition: height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.15s;
  position: relative;
  cursor: default;
  flex-shrink: 0;
}
.month-bar.total  { background: var(--bar-fill); }
.month-bar.issued { background: #8f3e4a; }
.month-bar:hover  { opacity: 0.75; }
.month-bar:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #fff;
  font-size: 11px;
  padding: 4px 9px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 20;
}
.month-lbl {
  font-size: 9px;
  color: var(--muted);
  white-space: nowrap;
  text-align: center;
  margin-top: 5px;
  line-height: 1;
}

/* ── REVENUE BAR ─────────────────────────────────────────── */
.bar-revenue {
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  white-space: nowrap;
}

/* ── BREAKDOWN ──────────────────────────────────────────── */
.breakdown-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px 40px;
}
@media (max-width: 900px) { .breakdown-grid { grid-template-columns: 1fr; } }
.breakdown-col-title {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding-left: 6px;
}

.bar-row {
  display: grid;
  grid-template-columns: 160px 1fr 56px;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  border-radius: 7px;
  padding: 3px 6px;
  transition: background 0.12s;
}
.bar-row:hover { background: rgba(79,106,108,0.08); }
.bar-row.active { background: rgba(79,106,108,0.15); }

.bar-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bar-track {
  height: 8px;
  background: var(--bar-bg);
  border-radius: 4px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--bar-fill);
  border-radius: 4px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

.bar-count {
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  text-align: right;
  white-space: nowrap;
}

/* ── FILTER BAR ─────────────────────────────────────────── */
.filter-bar {
  background: var(--paper);
  border-radius: 16px;
  padding: 14px 20px;
  box-shadow: 0 5px 20px var(--shadow);
  margin-bottom: 18px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: flex-end;
}

.fg { display: flex; flex-direction: column; gap: 4px; }

.fg-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
}

.fg-input {
  padding: 7px 11px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  background: rgba(245,246,244,0.85);
  font-family: inherit;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  height: 34px;
  transition: border-color 0.15s;
}
.fg-input:focus { border-color: var(--muted); }
.fg-input.wide   { min-width: 220px; }
.fg-input.narrow { min-width: 136px; }

.filter-right { margin-left: auto; display: flex; align-items: flex-end; gap: 8px; }

.filter-count { font-size: 11px; color: var(--muted); padding-bottom: 7px; white-space: nowrap; }

/* ── TABLE ──────────────────────────────────────────────── */
.table-card {
  background: var(--paper);
  border-radius: 16px;
  box-shadow: 0 5px 20px var(--shadow);
  overflow: hidden;
}

.table-scroll {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - 380px);
  min-height: 160px;
}

table { width: 100%; border-collapse: collapse; font-size: 13px; }

thead { position: sticky; top: 0; z-index: 10; }

thead th {
  background: rgba(50,76,78,0.93);
  color: #fff;
  padding: 10px 13px;
  text-align: left;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: background 0.13s;
}
thead th:hover { background: var(--ink); }

.sort-icon { display: inline-block; margin-left: 4px; opacity: 0.4; font-size: 9px; }
th.sort-asc  .sort-icon::after { content: "▲"; opacity: 1; color: #aee6e0; }
th.sort-desc .sort-icon::after { content: "▼"; opacity: 1; color: #aee6e0; }
th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: "⇅"; }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.09s; }
tbody tr:nth-child(even) { background: var(--row-alt); }
tbody tr:hover { background: var(--row-hover); }

tbody td { padding: 8px 13px; white-space: nowrap; max-width: 260px; overflow: hidden; text-overflow: ellipsis; }
td.cell-date  { font-variant-numeric: tabular-nums; font-weight: 600; }
td.cell-num   { font-variant-numeric: tabular-nums; text-align: right; }
td.cell-empty { color: var(--muted); }

.table-footer {
  padding: 10px 18px;
  font-size: 11px;
  color: var(--muted);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
}

/* ── STATE PLACEHOLDERS ─────────────────────────────────── */
.state { padding: 54px 20px; text-align: center; color: var(--muted); }
.state-icon  { font-size: 34px; margin-bottom: 11px; }
.state-title { font-size: 15px; font-weight: 700; margin-bottom: 5px; color: var(--ink); }
.state-sub   { font-size: 12px; line-height: 1.7; }
.state-sub code {
  background: rgba(0,0,0,0.06);
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 26px; height: 26px;
  border: 3px solid rgba(79,106,108,0.18);
  border-top-color: var(--muted);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  margin: 0 auto 11px;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="btn-back" href="index.html">← Dashboard</a>
  <div class="topbar-title">AIR RESERVATIONS</div>
  <div class="topbar-right">
    <button class="btn-sm btn-primary" id="btn-refresh" onclick="loadData()">Obnovit</button>
    <div class="topbar-meta" id="topbar-meta">Načítám…</div>
  </div>
</div>

<div class="main">

  <div class="error-box" id="error-box"></div>
  <div id="limit-banner" style="display:none; background:rgba(79,106,108,0.1); border:1.5px solid rgba(79,106,108,0.25); border-radius:12px; padding:11px 18px; font-size:13px; color:var(--muted); margin-bottom:18px;">
  </div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">Celkem rezervací</div>
      <div class="kpi-value" id="kpi-total">—</div>
    </div>
    <div class="kpi kpi-accent">
      <div class="kpi-label">Vydáno</div>
      <div class="kpi-value" id="kpi-issued">—</div>
      <div class="kpi-sub" id="kpi-issued-pct"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label" id="kpi-agency-label">Agentury</div>
      <div class="kpi-value" id="kpi-agencies">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Zemí</div>
      <div class="kpi-value" id="kpi-countries">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Poslední rezervace</div>
      <div class="kpi-value" id="kpi-last">—</div>
      <div class="kpi-sub" id="kpi-last-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Data od</div>
      <div class="kpi-value" id="kpi-from">—</div>
    </div>
  </div>

  <!-- QUICK DATE RANGE -->
  <div class="date-range-row">
    <span class="range-label">Pohled:</span>
    <button class="btn-range" onclick="setRange(1,this)">1M</button>
    <button class="btn-range active" onclick="setRange(3,this)">3M</button>
    <button class="btn-range" onclick="setRange(6,this)">6M</button>
    <button class="btn-range" onclick="setRange(12,this)">1R</button>
    <button class="btn-range" onclick="setRange(0,this)">Vše</button>
  </div>

  <!-- MONTHLY TREND -->
  <div class="chart-section" id="monthly-section">
    <div class="chart-header">
      <div class="chart-title">Měsíční trend</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-fill)"></div>Rezervace</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8f3e4a"></div>Vydáno</div>
      </div>
      <button class="chart-toggle" id="monthly-toggle" onclick="toggleSection('monthly')">Skrýt ▲</button>
    </div>
    <div class="monthly-wrap"><div class="monthly-bars" id="monthly-body"></div></div>
  </div>

  <!-- AGENCY CHART -->
  <div class="chart-section" id="chart-section">
    <div class="chart-header">
      <div class="chart-title" id="chart-title">Agentury</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-fill)"></div>Celkem</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8f3e4a"></div>Vydáno</div>
      </div>
      <button class="chart-toggle" id="chart-toggle" onclick="toggleChart()">Skrýt ▲</button>
    </div>
    <div class="chart-body" id="chart-body"></div>
  </div>

  <!-- BREAKDOWN: 6 panelů -->
  <div class="chart-section" id="breakdown-section">
    <div class="chart-header">
      <div class="chart-title">Přehled</div>
      <button class="chart-toggle" id="breakdown-toggle" onclick="toggleSection('breakdown')">Skrýt ▲</button>
    </div>
    <div class="breakdown-grid" style="grid-template-columns:1fr 1fr 1fr">
      <div>
        <div class="breakdown-col-title">Status</div>
        <div class="chart-body" style="grid-template-columns:1fr" id="status-body"></div>
      </div>
      <div>
        <div class="breakdown-col-title">Poslední status</div>
        <div class="chart-body" style="grid-template-columns:1fr" id="last-status-body"></div>
      </div>
      <div>
        <div class="breakdown-col-title">Země</div>
        <div class="chart-body" style="grid-template-columns:1fr" id="country-body"></div>
      </div>
      <div>
        <div class="breakdown-col-title">Měna &amp; Tržby</div>
        <div id="currency-body"></div>
      </div>
      <div>
        <div class="breakdown-col-title">Connector</div>
        <div class="chart-body" style="grid-template-columns:1fr" id="connector-body"></div>
      </div>
      <div>
        <div class="breakdown-col-title">Typ letu</div>
        <div class="chart-body" style="grid-template-columns:1fr" id="type-body"></div>
      </div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <div class="fg">
      <label class="fg-label">Hledat</label>
      <input class="fg-input wide" type="text" id="f-search"
             placeholder="Hledat ve všech sloupcích…" oninput="applyFilters()">
    </div>
    <div class="fg" id="fg-date-from" style="display:none">
      <label class="fg-label">Datum od</label>
      <input class="fg-input narrow" type="date" id="f-date-from" onchange="applyFilters();reloadStats()">
    </div>
    <div class="fg" id="fg-date-to" style="display:none">
      <label class="fg-label">Datum do</label>
      <input class="fg-input narrow" type="date" id="f-date-to" onchange="applyFilters();reloadStats()">
    </div>
    <div class="fg" id="fg-agency" style="display:none">
      <label class="fg-label" id="fg-agency-label">Agentura</label>
      <select class="fg-input narrow" id="f-agency" onchange="applyFilters();reloadStats()">
        <option value="">Všechny</option>
      </select>
    </div>
    <div class="filter-right">
      <span class="filter-count" id="filter-count"></span>
      <button class="btn-sm btn-outline" onclick="clearFilters()">Vymazat filtry</button>
      <button class="btn-sm btn-outline" id="btn-export" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-scroll" id="table-container">
      <div class="state">
        <div class="spinner"></div>
        <div class="state-title">Načítám data…</div>
        <div class="state-sub">Připojuji se k databázi</div>
      </div>
    </div>
    <div class="table-footer" id="table-footer"></div>
  </div>

</div>

<script>
const API = "http://localhost:8080";

let allRows      = [];
let allColumns   = [];
let filteredRows = [];
let specialCols  = { date: null, agency: null };
let sortState    = { col: null, dir: "asc" };
let chartCollapsed  = false;
let activeBarAgency = null;
let _statsLoaded    = false; // true once /api/stats populated KPIs
let _lastStats      = null;  // cached stats for chart rebuilds

// ── Column detection ────────────────────────────────────────────

function detectCols(cols) {
  const lc = s => s.toLowerCase();
  return {
    date: cols.find(c =>
      lc(c).includes("date") || lc(c) === "datum" || lc(c).includes("datum")
    ) || null,
    agency: cols.find(c =>
      lc(c).includes("agency") || lc(c).includes("agentur") ||
      lc(c).includes("agent")  || lc(c).includes("iata")    ||
      lc(c).includes("client") || lc(c).includes("customer")
    ) || null,
  };
}

// ── Date helpers ────────────────────────────────────────────────

function parseDate(v) {
  if (!v) return null;
  const s = String(v);
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(s)) {
    const [d,m,y] = s.split(".");
    return new Date(+y, +m-1, +d);
  }
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s.slice(0,10));
  return null;
}

function fmtDate(v) {
  const d = parseDate(v);
  return d ? d.toLocaleDateString("cs-CZ",{day:"2-digit",month:"2-digit",year:"numeric"}) : String(v??"");
}

function toISO(d) { return d.toISOString().slice(0,10); }

// ── Stats: rychlé KPI + grafy hned při načtení ─────────────────

function applyStats(stats) {
  _statsLoaded = true;
  _lastStats   = stats;
  const t = stats.totals || {};

  if (t.total    != null) document.getElementById("kpi-total").textContent     = fmt(t.total);
  if (t.agencies != null) document.getElementById("kpi-agencies").textContent  = fmt(t.agencies);
  if (t.countries!= null) document.getElementById("kpi-countries").textContent = fmt(t.countries);
  if (t.issued   != null) {
    document.getElementById("kpi-issued").textContent = fmt(t.issued);
    const pct = t.total > 0 ? Math.round(t.issued / t.total * 100) : 0;
    document.getElementById("kpi-issued-pct").textContent = `${pct} % z celku`;
  }

  const monthly = stats.monthly || [];
  if (monthly.length) {
    document.getElementById("kpi-from").textContent = fmtMonth(monthly[0].month);
    document.getElementById("kpi-last").textContent = fmtMonth(monthly[monthly.length - 1].month);
    document.getElementById("kpi-last-sub").textContent = "";
  }

  buildMonthlyChart(stats.monthly || []);
  buildChartFromStats(stats.by_agency || []);
  buildBreakdownCharts(stats);
}

function fmt(n)      { return Number(n).toLocaleString("cs-CZ"); }
function fmtMonth(ym) {
  if (!ym) return "—";
  const [y, m] = ym.split("-");
  return `${m}/${y}`;
}

// Měsíční trend — dvě série: rezervace vs vydáno
function buildMonthlyChart(monthly) {
  const items   = (monthly || []).filter(x => x.month);
  const section = document.getElementById("monthly-section");
  if (!items.length) { section.classList.remove("visible"); return; }
  section.classList.add("visible");

  const maxTotal = Math.max(...items.map(x => Number(x.total))) || 1;
  const H = 110;

  document.getElementById("monthly-body").innerHTML = items.map(({month, total, issued}) => {
    const tot = Number(total), iss = Number(issued || 0);
    const hT  = Math.max(2, Math.round(tot / maxTotal * H));
    const hI  = Math.max(0, Math.round(iss / maxTotal * H));
    const lbl = month.slice(2).replace("-", "/");
    const pct = tot > 0 ? Math.round(iss / tot * 100) : 0;
    return `<div class="month-col">
      <div class="month-pair">
        <div class="month-bar total"  style="height:${hT}px"
             data-tip="${esc(month)}: ${fmt(tot)} rezervací"></div>
        <div class="month-bar issued" style="height:${hI}px"
             data-tip="${esc(month)}: ${fmt(iss)} vydáno (${pct} %)"></div>
      </div>
      <div class="month-lbl">${esc(lbl)}</div>
    </div>`;
  }).join("");
}

// Agency — celkem + vydáno %
function buildChartFromStats(byAgency) {
  const items   = byAgency.filter(x => x.label && x.label !== "(prázdné)");
  const section = document.getElementById("chart-section");
  if (!items.length) { section.classList.remove("visible"); return; }
  section.classList.add("visible");
  if (chartCollapsed) return;

  const maxCnt = items[0]?.cnt || 1;
  document.getElementById("chart-body").innerHTML = items.slice(0, 15).map(({label, cnt, issued}) => {
    const w   = Math.round(Number(cnt)    / maxCnt * 100);
    const wi  = Math.round(Number(issued||0) / maxCnt * 100);
    const pct = cnt > 0 ? Math.round((issued||0) / cnt * 100) : 0;
    const act = activeBarAgency === label ? "active" : "";
    return `<div class="bar-row ${act}" onclick="clickBar('${esc(label)}')"
         title="${esc(label)}: ${fmt(cnt)} rezervací, ${fmt(issued||0)} vydáno (${pct} %)">
      <div class="bar-label">${esc(label)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${w}%"></div>
        <div class="bar-fill" style="width:${wi}%;background:#8f3e4a;margin-top:2px"></div>
      </div>
      <div class="bar-count">${fmt(cnt)}<br><small style="color:#8f3e4a">${fmt(issued||0)} (${pct}%)</small></div>
    </div>`;
  }).join("");
}

// Breakdown — 6 panelů
function buildBreakdownCharts(stats) {
  const section = document.getElementById("breakdown-section");
  const allItems = [
    stats.by_status, stats.by_last_status, stats.by_country,
    stats.by_currency, stats.by_connector, stats.by_type
  ];
  if (!allItems.some(a => (a||[]).length > 0)) {
    section.classList.remove("visible"); return;
  }
  section.classList.add("visible");

  const renderBars = (items, n) => {
    if (!items?.length) return "";
    const maxCnt = Math.max(...items.map(x => Number(x.cnt))) || 1;
    return items.slice(0, n).map(({label, cnt}) => {
      const w = Math.round(Number(cnt) / maxCnt * 100);
      return `<div class="bar-row" style="cursor:default">
        <div class="bar-label">${esc(label)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div>
        <div class="bar-count">${fmt(cnt)}</div>
      </div>`;
    }).join("");
  };

  document.getElementById("status-body").innerHTML      = renderBars(stats.by_status, 10);
  document.getElementById("last-status-body").innerHTML = renderBars(stats.by_last_status, 10);
  document.getElementById("country-body").innerHTML     = renderBars(stats.by_country, 12);
  document.getElementById("connector-body").innerHTML   = renderBars(stats.by_connector, 10);
  document.getElementById("type-body").innerHTML        = renderBars(stats.by_type, 10);

  // Měna + tržby (speciální layout s revenue)
  const currencies = stats.by_currency || [];
  if (currencies.length) {
    const maxRev = Math.max(...currencies.map(x => Number(x.revenue||0))) || 1;
    document.getElementById("currency-body").innerHTML = currencies.slice(0, 8).map(({label, cnt, revenue}) => {
      const rev = Number(revenue || 0);
      const w   = Math.round(rev / maxRev * 100);
      return `<div class="bar-row" style="cursor:default;grid-template-columns:60px 1fr 90px">
        <div class="bar-label" style="font-weight:800">${esc(label)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div>
        <div class="bar-count" style="font-size:10px">${rev > 0 ? fmt(Math.round(rev)) : fmt(cnt)+" ks"}</div>
      </div>`;
    }).join("");
  }
}

// ── Načtení dat ─────────────────────────────────────────────────
// Stats a záznamy se spouštějí paralelně.
// Stats (agregované query) obvykle dorazí dřív → KPI + graf se zobrazí okamžitě.
// Tabulka se zobrazí, jakmile dorazí záznamy.

async function loadData() {
  const btn = document.getElementById("btn-refresh");
  btn.disabled = true; btn.textContent = "…";
  _statsLoaded = false;
  showLoadingState();
  hideError();

  // /api/stats – spustit ihned, výsledek aplikovat hned jak přijde
  fetch(`${API}/api/stats`)
    .then(r => r.json())
    .then(data => { if (data.ok) applyStats(data); })
    .catch(() => {}); // selhání stats není kritické

  // /api/reservations – čekáme na tabulku
  try {
    const limit = window._loadAll ? 0 : 200;
    const res   = await fetch(`${API}/api/reservations?limit=${limit}`);
    const data  = await res.json();
    if (!data.ok) throw new Error(data.error || "Neznámá chyba");

    allRows     = data.rows;
    allColumns  = data.columns;
    specialCols = detectCols(allColumns);

    buildControls();
    computeKPIs();   // doplní/přepíše jen to, co stats ještě nestihlo
    applyFilters();

    const t = new Date().toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    const realTotal = data.total;
    const limitBanner = document.getElementById("limit-banner");
    if (data.limited) {
      limitBanner.style.display = "";
      limitBanner.innerHTML = `Zobrazeno <strong>${data.count.toLocaleString("cs-CZ")}</strong> nejnovějších záznamů`
        + ` z celkových <strong>${Number(realTotal).toLocaleString("cs-CZ")}</strong>.`
        + ` <a href="#" onclick="loadAll(event)">Načíst vše</a> (může trvat déle)`;
    } else {
      limitBanner.style.display = "none";
    }
    document.getElementById("topbar-meta").innerHTML =
      `Aktualizováno: ${t}<br>${data.count.toLocaleString("cs-CZ")} z ${Number(realTotal).toLocaleString("cs-CZ")} záznamů`;

  } catch(e) {
    showError(e.message);
    showErrorState();
  } finally {
    btn.disabled = false; btn.textContent = "Obnovit";
  }
}

// ── Build controls ──────────────────────────────────────────────

function buildControls() {
  const {date, agency} = specialCols;

  document.getElementById("fg-date-from").style.display = date ? "" : "none";
  document.getElementById("fg-date-to").style.display   = date ? "" : "none";
  if (date) {
    const dates = allRows.map(r => parseDate(r[date])).filter(Boolean).sort((a,b)=>a-b);
    if (dates.length) {
      const last  = dates[dates.length-1];
      const from3 = new Date(last); from3.setMonth(from3.getMonth()-3);
      document.getElementById("f-date-from").value = toISO(from3);
      document.getElementById("f-date-to").value   = toISO(last);
    }
  }

  const agFg = document.getElementById("fg-agency");
  if (agency) {
    const lbl = agency.replace(/_/g," ");
    document.getElementById("fg-agency-label").textContent  = lbl;
    document.getElementById("kpi-agency-label").textContent = lbl;
    document.getElementById("chart-title").textContent      = lbl.charAt(0).toUpperCase()+lbl.slice(1)+" – počty rezervací";

    const vals = [...new Set(allRows.map(r=>r[agency]).filter(v=>v!=null))].map(String).sort();
    const sel  = document.getElementById("f-agency");
    sel.innerHTML = `<option value="">Všechny (${vals.length})</option>` +
      vals.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join("");
    agFg.style.display = "";
  } else {
    agFg.style.display = "none";
  }
}

// ── KPI ─────────────────────────────────────────────────────────

function computeKPIs() {
  if (!_statsLoaded)
    document.getElementById("kpi-total").textContent = allRows.length.toLocaleString("cs-CZ");

  const {date, agency} = specialCols;

  if (date) {
    const sorted = allRows
      .map(r => ({raw: r[date], d: parseDate(r[date])}))
      .filter(x => x.d)
      .sort((a,b) => a.d - b.d);
    if (sorted.length) {
      const first = sorted[0], last = sorted[sorted.length-1];
      document.getElementById("kpi-from").textContent = fmtDate(first.raw);
      document.getElementById("kpi-last").textContent = fmtDate(last.raw);
      const diff = Math.round((new Date() - last.d) / 86400000);
      document.getElementById("kpi-last-sub").textContent =
        diff === 0 ? "dnes" : diff === 1 ? "včera" : `před ${diff} dny`;
    }
  }

  if (agency && !_statsLoaded) {
    const n = new Set(allRows.map(r=>r[agency]).filter(v=>v!=null)).size;
    document.getElementById("kpi-agencies").textContent = n;
  }
}

// ── Chart ────────────────────────────────────────────────────────

function buildChart(rows) {
  const section = document.getElementById("chart-section");
  if (!specialCols.agency) { section.classList.remove("visible"); return; }
  if (_statsLoaded) {
    // Pouze aktualizuj aktivní bar, bez přestavby celého grafu
    document.querySelectorAll("#chart-body .bar-row").forEach(row => {
      const lbl = row.querySelector(".bar-label")?.textContent ?? "";
      row.classList.toggle("active", lbl === activeBarAgency);
    });
    return;
  }

  section.classList.add("visible");
  if (chartCollapsed) return;

  const {agency} = specialCols;
  const counts = {};
  allRows.forEach(r => {
    const v = String(r[agency] ?? "");
    if (v) counts[v] = (counts[v] || 0) + 1;
  });
  const top = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 20);
  const max = top[0]?.[1] || 1;

  document.getElementById("chart-body").innerHTML = top.map(([name, cnt]) => {
    const w   = Math.round(cnt / max * 100);
    const act = activeBarAgency === name ? "active" : "";
    return `<div class="bar-row ${act}" onclick="clickBar('${esc(name)}')" title="${esc(name)}: ${cnt} rezervací">
      <div class="bar-label">${esc(name)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div>
      <div class="bar-count">${cnt.toLocaleString("cs-CZ")}</div>
    </div>`;
  }).join("");
}

function clickBar(name) {
  const sel = document.getElementById("f-agency");
  if (activeBarAgency === name) {
    activeBarAgency = null;
    sel.value = "";
  } else {
    activeBarAgency = name;
    sel.value = name;
  }
  applyFilters();
}

function toggleChart() {
  chartCollapsed = !chartCollapsed;
  const body = document.getElementById("chart-body");
  const btn  = document.getElementById("chart-toggle");
  body.style.display = chartCollapsed ? "none" : "";
  btn.textContent    = chartCollapsed ? "Zobrazit ▼" : "Skrýt ▲";
}

function toggleSection(id) {
  const section = document.getElementById(id + "-section");
  const btn     = document.getElementById(id + "-toggle");
  const content = section.querySelector(":scope > :not(.chart-header)");
  const hidden  = content.style.display === "none";
  content.style.display = hidden ? "" : "none";
  btn.textContent       = hidden ? "Skrýt ▲" : "Zobrazit ▼";
}

// ── Filters ──────────────────────────────────────────────────────

function applyFilters() {
  const search   = document.getElementById("f-search").value.toLowerCase().trim();
  const dateFrom = document.getElementById("f-date-from").value;
  const dateTo   = document.getElementById("f-date-to").value;
  const agency   = document.getElementById("f-agency").value;

  if (activeBarAgency && agency !== activeBarAgency) activeBarAgency = null;

  const {date: dc, agency: ac} = specialCols;

  filteredRows = allRows.filter(row => {
    if (search) {
      if (!Object.values(row).map(v=>String(v??"")).join(" ").toLowerCase().includes(search))
        return false;
    }
    if (dc && (dateFrom || dateTo)) {
      const d = parseDate(row[dc]);
      if (d) {
        if (dateFrom && d < new Date(dateFrom)) return false;
        if (dateTo   && d > new Date(dateTo+"T23:59:59")) return false;
      }
    }
    if (ac && agency && String(row[ac]) !== agency) return false;
    return true;
  });

  if (sortState.col !== null) filteredRows = doSort(filteredRows);

  renderTable(filteredRows);
  buildChart(filteredRows);

  const n   = filteredRows.length;
  const tot = allRows.length;
  const txt = n < tot
    ? `Zobrazeno ${n.toLocaleString("cs-CZ")} z ${tot.toLocaleString("cs-CZ")}`
    : `${tot.toLocaleString("cs-CZ")} záznamů`;
  document.getElementById("filter-count").textContent = txt;
  document.getElementById("table-footer").textContent = txt;
}

function clearFilters() {
  document.getElementById("f-search").value    = "";
  document.getElementById("f-date-from").value = "";
  document.getElementById("f-date-to").value   = "";
  document.getElementById("f-agency").value    = "";
  activeBarAgency = null;
  document.querySelectorAll(".btn-range").forEach(b => b.classList.remove("active"));
  document.querySelector(".btn-range[onclick='setRange(3)']")?.classList.add("active");
  applyFilters();
  reloadStats();
}

// Rychlé filtry pohledu
function setRange(months, btn) {
  document.querySelectorAll(".btn-range").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  if (months === 0) {
    document.getElementById("f-date-from").value = "";
    document.getElementById("f-date-to").value   = "";
  } else {
    const to   = new Date();
    const from = new Date(to);
    from.setMonth(from.getMonth() - months);
    document.getElementById("f-date-from").value = toISO(from);
    document.getElementById("f-date-to").value   = toISO(to);
  }
  applyFilters();
  reloadStats();
}

// Znovu načte stats s aktuálními filtry (pro grafy)
function reloadStats() {
  const params = new URLSearchParams();
  const df = document.getElementById("f-date-from").value;
  const dt = document.getElementById("f-date-to").value;
  if (df) params.set("date_from", df);
  if (dt) params.set("date_to",   dt);
  const agency = document.getElementById("f-agency").value;
  if (agency) params.set("agency", agency);

  const qs = params.toString();
  fetch(`${API}/api/stats${qs ? "?" + qs : ""}`)
    .then(r => r.json())
    .then(data => { if (data.ok) applyStats(data); })
    .catch(() => {});
}

// ── Sort ─────────────────────────────────────────────────────────

function toggleSort(col) {
  sortState.dir = sortState.col === col && sortState.dir === "asc" ? "desc" : "asc";
  sortState.col = col;
  applyFilters();
}

function doSort(rows) {
  const col = sortState.col, dir = sortState.dir === "asc" ? 1 : -1;
  return [...rows].sort((a,b) => {
    let va = a[col], vb = b[col];
    const da = parseDate(va), db = parseDate(vb);
    if (da && db) return dir * (da - db);
    const na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return dir * (na - nb);
    va = String(va??"").toLowerCase(); vb = String(vb??"").toLowerCase();
    return dir * (va < vb ? -1 : va > vb ? 1 : 0);
  });
}

// ── Render table ─────────────────────────────────────────────────

function renderTable(rows) {
  const el = document.getElementById("table-container");
  if (!rows.length) {
    el.innerHTML = `<div class="state">
      <div class="state-icon">🔍</div>
      <div class="state-title">Žádné záznamy</div>
      <div class="state-sub">Zkus upravit nebo vymazat filtry.</div>
    </div>`;
    return;
  }
  const dc = specialCols.date;
  const heads = allColumns.map(col => {
    const cls = sortState.col === col ? (sortState.dir==="asc"?"sort-asc":"sort-desc") : "";
    return `<th class="${cls}" onclick="toggleSort('${esc(col)}')">${esc(col.replace(/_/g," ").toUpperCase())}<i class="sort-icon"></i></th>`;
  }).join("");

  const body = rows.map(row => {
    const cells = allColumns.map(col => {
      let v = row[col], cls = "";
      if (col === dc) { v = fmtDate(v); cls = "cell-date"; }
      else if (v === null || v === undefined || v === "") { v = ""; cls = "cell-empty"; }
      else if (!isNaN(parseFloat(v)) && isFinite(v)) { v = String(v); cls = "cell-num"; }
      else v = String(v);
      return `<td class="${cls}" title="${esc(v)}">${esc(v)}</td>`;
    }).join("");
    return `<tr>${cells}</tr>`;
  }).join("");

  el.innerHTML = `<table><thead><tr>${heads}</tr></thead><tbody>${body}</tbody></table>`;
}

// ── CSV Export ────────────────────────────────────────────────────

function exportCSV() {
  if (!filteredRows.length) return;
  const dc = specialCols.date;
  const header = allColumns.join(",");
  const body = filteredRows.map(row =>
    allColumns.map(col => {
      let v = row[col];
      if (col === dc) v = fmtDate(v);
      v = String(v ?? "").replace(/"/g, '""');
      return `"${v}"`;
    }).join(",")
  ).join("\n");

  const blob = new Blob(["\uFEFF" + header + "\n" + body], { type: "text/csv;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement("a"), {
    href: url,
    download: `air-reservations-${new Date().toISOString().slice(0,10)}.csv`
  });
  a.click();
  URL.revokeObjectURL(url);
}

// ── States ────────────────────────────────────────────────────────

function showLoadingState() {
  document.getElementById("table-container").innerHTML = `
    <div class="state">
      <div class="spinner"></div>
      <div class="state-title">Načítám data…</div>
      <div class="state-sub">Připojuji se k databázi</div>
    </div>`;
  document.getElementById("topbar-meta").textContent = "Načítám…";
}

function showErrorState() {
  document.getElementById("table-container").innerHTML = `
    <div class="state">
      <div class="state-icon">⚠️</div>
      <div class="state-title">Nelze načíst data</div>
      <div class="state-sub">
        Spusť server dvojklikem na <code>start-server.bat</code><br>
        nebo ručně: <code>python server.py</code><br><br>
        Zkontroluj také, zda je vyplněný soubor <code>.env</code><br>
        se správnými přihlašovacími údaji k PostgreSQL.
      </div>
    </div>`;
  document.getElementById("topbar-meta").textContent = "Chyba připojení";
}

function showError(msg) {
  const b = document.getElementById("error-box");
  b.textContent = `Chyba: ${msg}`;
  b.classList.add("show");
}

function hideError() { document.getElementById("error-box").classList.remove("show"); }

function esc(s) {
  return String(s??"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Init ──────────────────────────────────────────────────────────

function loadAll(e) {
  e.preventDefault();
  window._loadAll = true;
  loadData();
}

loadData();
</script>
