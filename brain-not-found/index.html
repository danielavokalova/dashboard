<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Not Found</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      width: 100%;
      max-width: 640px;
    }

    .tile {
      height: 90px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      line-height: 1.4;
      padding: 12px;
    }

    .tile:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(37,99,235,0.13);
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <h1>Brain Not Found</h1>
  <div class="tiles">
    <a class="tile" href="tools/email-generator.html">Email<br>Generator</a>
    <a class="tile" href="tools/smart-reply.html">Smart<br>Reply</a>
    <a class="tile" href="inbox/index.html">Quick<br>Notes</a>
    <a class="tile" href="https://danielavokalova.github.io/dashboard/" target="_blank" rel="noopener noreferrer">Dashboard</a>
  </div>
</body>
</html>
