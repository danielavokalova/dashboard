<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <g id="bloom">
      <g fill="#f2f0dd">
        <ellipse cx="0" cy="-26" rx="13" ry="20"/>
        <ellipse cx="0" cy="-26" rx="13" ry="20" transform="rotate(72)"/>
        <ellipse cx="0" cy="-26" rx="13" ry="20" transform="rotate(144)"/>
        <ellipse cx="0" cy="-26" rx="13" ry="20" transform="rotate(216)"/>
        <ellipse cx="0" cy="-26" rx="13" ry="20" transform="rotate(288)"/>
      </g>
      <circle r="10" fill="#ddd6b4"/>
      <circle r="4.5" fill="#2e3450" opacity="0.75"/>
    </g>
    <g id="bloom-tan">
      <g fill="#ddd6b4">
        <ellipse cx="0" cy="-20" rx="10" ry="15"/>
        <ellipse cx="0" cy="-20" rx="10" ry="15" transform="rotate(72)"/>
        <ellipse cx="0" cy="-20" rx="10" ry="15" transform="rotate(144)"/>
        <ellipse cx="0" cy="-20" rx="10" ry="15" transform="rotate(216)"/>
        <ellipse cx="0" cy="-20" rx="10" ry="15" transform="rotate(288)"/>
      </g>
      <circle r="8" fill="#f2f0dd"/>
      <circle r="3.5" fill="#2e3450" opacity="0.6"/>
    </g>
    <g id="bud">
      <circle r="7" fill="#f2f0dd"/>
      <circle r="3" fill="#ddd6b4"/>
    </g>
    <g id="leaf">
      <path d="M0 0 Q 12 -14 30 -10 Q 18 6 0 0 Z" fill="#ddd6b4" opacity="0.9"/>
      <path d="M2 -1 Q 16 -8 27 -9" stroke="#aebcc9" stroke-width="1.6" fill="none"/>
    </g>
    <g id="sprig">
      <path d="M0 0 C 8 -22 4 -44 16 -62" stroke="#f2f0dd" stroke-width="3" fill="none" stroke-linecap="round"/>
      <use href="#leaf" transform="translate(4,-18) rotate(-30)"/>
      <use href="#leaf" transform="translate(8,-36) rotate(150) scale(0.85)"/>
      <use href="#bud" transform="translate(16,-62)"/>
    </g>
  </defs>

  <rect width="480" height="480" fill="#aebcc9"/>

  <!-- soft cream speckles -->
  <g fill="#f2f0dd" opacity="0.45">
    <circle cx="36" cy="150" r="3"/><circle cx="128" cy="52" r="2.5"/><circle cx="212" cy="150" r="3"/>
    <circle cx="316" cy="60" r="2.5"/><circle cx="420" cy="150" r="3"/><circle cx="76" cy="256" r="2.5"/>
    <circle cx="176" cy="330" r="3"/><circle cx="276" cy="252" r="2.5"/><circle cx="378" cy="330" r="3"/>
    <circle cx="36" cy="404" r="2.5"/><circle cx="240" cy="440" r="3"/><circle cx="450" cy="420" r="2.5"/>
    <circle cx="150" cy="204" r="2.5"/><circle cx="352" cy="204" r="3"/><circle cx="60" cy="60" r="2.5"/>
  </g>

  <!-- blooms and sprigs -->
  <use href="#bloom" transform="translate(90,100)"/>
  <use href="#sprig" transform="translate(120,190) rotate(20)"/>
  <use href="#bloom-tan" transform="translate(210,60) rotate(15)"/>
  <use href="#bloom" transform="translate(340,130) rotate(30) scale(1.15)"/>
  <use href="#sprig" transform="translate(300,230) rotate(-40) scale(0.9)"/>
  <use href="#bloom-tan" transform="translate(60,300) rotate(-20)"/>
  <use href="#bloom" transform="translate(180,280) rotate(50) scale(0.85)"/>
  <use href="#sprig" transform="translate(230,410) rotate(160)"/>
  <use href="#bloom" transform="translate(320,360) rotate(-15)"/>
  <use href="#bloom-tan" transform="translate(430,270) rotate(40) scale(0.9)"/>
  <use href="#bloom-tan" transform="translate(110,420) rotate(70) scale(0.8)"/>
  <use href="#sprig" transform="translate(400,60) rotate(80) scale(0.8)"/>
  <use href="#bud" transform="translate(260,180)"/>
  <use href="#bud" transform="translate(40,210)"/>
  <use href="#bud" transform="translate(410,410)"/>
</svg>
