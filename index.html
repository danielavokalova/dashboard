<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
:root {
  --ink: #1f2a2a;
  --blue-muted: #4f6a6c;
  --blue-line: #425c5e;
  --paper: rgba(245,246,244,0.92);
  --tile-bg: rgba(245,246,244,0.9);
  --tile-shadow: rgba(90,115,115,0.35);
  --notes-bg: rgba(245,246,244,0.94);
  --octopus: #8f3e4a;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: "Segoe UI", system-ui, sans-serif;
  background: url("botanicus.png") repeat;
  color: var(--ink);
}

/* HEADER */
header {
  padding: 36px 56px 24px;
}

.header-row {
  display: flex;
  align-items: center;
  gap: 22px;
}

#clock {
  margin-left: auto;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--blue-muted);
  text-align: right;
  line-height: 1.5;
}

h1 {
  font-size: 28px;
  letter-spacing: 0.28em;
  font-weight: 800;
  color: var(--ink);
  text-shadow: 0 1px 4px rgba(90,115,115,0.18);
}

.divider {
  height: 2px;
  background: var(--blue-line);
  margin-top: 18px;
}

/* MAIN */
main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 44px;
  padding: 40px 56px;
}

.content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 44px;
  align-items: start;
}

.col-left, .col-right {
  min-width: 0;
}

/* SECTIONS */
.section-container {
  margin-bottom: 45px;
}

.section-label {
  display: block;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.4em;
  color: var(--blue-muted);
  text-transform: uppercase;
  margin-bottom: 20px;
  width: fit-content;
}

/* TILES */
.tiles {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 14px;
}

.tile {
  height: 80px;
  background: var(--tile-bg);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--blue-muted);
  text-align: center;
  line-height: 1.4;
  box-shadow: 0 8px 22px var(--tile-shadow);
  backdrop-filter: blur(2px);
  text-decoration: none;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.tile:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 32px rgba(90,115,115,0.45);
}

/* SIDE PANEL */
.side {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.side-tiles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* NOTES */
.notes {
  flex: 1;
  background: var(--notes-bg);
  border-radius: 26px;
  padding: 28px;
  box-shadow: 0 8px 26px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
}

.notes h2 {
  font-size: 12px;
  letter-spacing: 0.24em;
  margin-bottom: 18px;
  color: var(--blue-muted);
}

.notes textarea {
  flex: 1;
  border: none;
  background: transparent;
  resize: none;
  font-family: inherit;
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink);
  outline: none;
}

/* FOOTER */
footer {
  background: var(--paper);
  border-top: 2px solid var(--blue-line);
  padding: 32px 56px;
  height: 120px;
  display: flex;
  align-items: center;
  color: var(--blue-muted);
  font-size: 13px;
}

/* OCTOPUS */
.logo-chobotnice {
  color: var(--octopus);
  width: 56px;
  height: 56px;
}
</style>
</head>

<script>
const textarea = document.getElementById("notes");
textarea.value = localStorage.getItem("dashboardNotes") || "";
textarea.addEventListener("input", () => {
  localStorage.setItem("dashboardNotes", textarea.value);
});

const clock = document.getElementById("clock");
function updateClock() {
  const now = new Date();
  const date = now.toLocaleDateString("cs-CZ", { weekday: "short", day: "numeric", month: "long", year: "numeric" });
  const time = now.toLocaleTimeString("cs-CZ", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  clock.innerHTML = `${date}<br>${time}`;
}
updateClock();
setInterval(updateClock, 1000);
</script>
