<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Designer — GOL IBE</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-page: #0f1117;
  --surface: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text-ui: #e8eaf0;
  --muted: #8890a8;
  --accent-ui: #6c8ff8;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: "Segoe UI", system-ui, sans-serif;
  background: #0f1117;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108,143,248,0.15), transparent),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(167,108,248,0.1), transparent);
  color: var(--text-ui);
}

/* HEADER */
header {
  padding: 22px 48px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  background: rgba(15,17,23,0.9);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 10;
}
.logo {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, #6c8ff8, #a76cf8);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.header-text h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
.header-text p { font-size: 11px; color: var(--muted); margin-top: 2px; }
.header-badge {
  margin-left: auto;
  background: rgba(108,143,248,0.15);
  border: 1px solid rgba(108,143,248,0.3);
  color: #6c8ff8;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
}

/* LAYOUT */
main {
  flex: 1;
  display: grid;
  grid-template-columns: 280px 1fr;
}

/* SIDEBAR */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 20px 18px;
  display: flex; flex-direction: column; gap: 24px;
  overflow-y: auto;
}
.section-title {
  font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--muted); font-weight: 700; margin-bottom: 10px;
}

/* THEME CARDS */
.theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.theme-card {
  border-radius: 10px; overflow: hidden; cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s, transform 0.15s;
  background: var(--surface);
}
.theme-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
.theme-card.active { border-color: var(--accent-ui); }
.theme-swatch { height: 54px; display: flex; align-items: center; justify-content: center; }
.mini-email {
  width: 44px; height: 36px; border-radius: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  display: flex; flex-direction: column; overflow: hidden;
}
.mini-top { height: 10px; width: 100%; }
.mini-body { flex: 1; padding: 3px 4px; display: flex; flex-direction: column; gap: 2px; }
.mini-line { height: 2px; border-radius: 1px; }
.theme-name {
  padding: 6px 8px; font-size: 9px; font-weight: 600;
  letter-spacing: 0.06em; color: var(--muted); text-align: center;
}
.theme-card.active .theme-name { color: var(--accent-ui); }

/* CONTROLS */
.control-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.control-row:last-child { border-bottom: none; }
.control-label { font-size: 12px; color: var(--muted); }
input[type="color"] {
  width: 34px; height: 24px; border: 2px solid var(--border);
  border-radius: 7px; background: transparent; cursor: pointer; padding: 1px;
}
select {
  font-family: inherit; font-size: 11px; color: var(--text-ui);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; padding: 4px 7px; cursor: pointer; outline: none; max-width: 120px;
}
select option { background: #1e2030; }

/* BUTTONS */
.btn-group { display: flex; flex-direction: column; gap: 7px; }
.btn {
  width: 100%; padding: 10px; border: none; border-radius: 9px;
  font-family: inherit; font-size: 11px; letter-spacing: 0.14em;
  font-weight: 700; text-transform: uppercase; cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
}
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-preview { background: #ffffff; color: #1a1a2e; border: 1px solid rgba(255,255,255,0.25); }
.btn-primary { background: linear-gradient(135deg, #6c8ff8, #a76cf8); color: white; }
.btn-secondary { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

/* PREVIEW AREA */
.preview-area { display: flex; flex-direction: column; overflow: hidden; }
.preview-toolbar {
  padding: 12px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.preview-dots { display: flex; gap: 5px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }
.preview-label { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }

.preview-scroll {
  flex: 1; overflow-y: auto;
  background: #d8d9de;
  padding: 28px 20px;
}
.preview-sheet {
  max-width: 560px; margin: 0 auto;
  box-shadow: 0 2px 20px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.08);
  transform-origin: top center;
}

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #1a1b23; border-radius: 16px;
  border: 1px solid var(--border);
  width: 90vw; max-width: 680px;
  max-height: 88vh;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  overflow: hidden;
}
.modal-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-title { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; color: var(--text-ui); }
.modal-close {
  background: rgba(255,255,255,0.08); border: none; color: var(--muted);
  width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.modal-close:hover { background: rgba(255,255,255,0.15); }
.modal-body {
  overflow-y: auto; background: #d8d9de; padding: 24px 20px; flex: 1;
}
.modal-email-sheet {
  max-width: 500px; margin: 0 auto;
  box-shadow: 0 2px 16px rgba(0,0,0,0.2);
}

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 28px;
  background: linear-gradient(135deg, #6c8ff8, #a76cf8);
  color: white; padding: 10px 20px; border-radius: 9px;
  font-size: 11px; letter-spacing: 0.14em; font-weight: 700; text-transform: uppercase;
  box-shadow: 0 6px 20px rgba(108,143,248,0.35);
  transform: translateY(70px); transition: transform 0.28s ease;
  pointer-events: none; z-index: 300;
}
.toast.show { transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">✉</div>
  <div class="header-text">
    <h1>Notification Designer</h1>
    <p>GOL IBE · Booking Confirmation</p>
  </div>
  <div class="header-badge">Preview Tool</div>
</header>

<main>
  <aside class="sidebar">

    <div>
      <div class="section-title">Theme</div>
      <div class="theme-grid" id="themeGrid"></div>
    </div>

    <div>
      <div class="section-title">Fine-tune</div>
      <div class="control-row">
        <span class="control-label">Email background</span>
        <input type="color" id="cBg">
      </div>
      <div class="control-row">
        <span class="control-label">Accent colour</span>
        <input type="color" id="cAccent">
      </div>
      <div class="control-row">
        <span class="control-label">Body text</span>
        <input type="color" id="cText">
      </div>
      <div class="control-row">
        <span class="control-label">Label text</span>
        <input type="color" id="cLabel">
      </div>
      <div class="control-row">
        <span class="control-label">Card border</span>
        <input type="color" id="cBorder">
      </div>
      <div class="control-row">
        <span class="control-label">Font</span>
        <select id="fontSel">
          <option value="'Inter', Helvetica, Arial, sans-serif">Inter</option>
          <option value="Muli, Helvetica, Arial, sans-serif">Muli</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
          <option value="Verdana, sans-serif">Verdana</option>
          <option value="'Courier New', monospace">Courier New</option>
        </select>
      </div>
    </div>

    <div>
      <div class="section-title">Preview &amp; Export</div>
      <div class="btn-group">
        <button class="btn btn-preview" onclick="openPreview()">👁 Preview</button>
        <button class="btn btn-primary" onclick="copyHTML()">Copy HTML</button>
        <button class="btn btn-secondary" onclick="downloadHTML()">Download HTML</button>
      </div>
    </div>

  </aside>

  <section class="preview-area">
    <div class="preview-toolbar">
      <div class="preview-dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <span class="preview-label">Live preview — updates as you change settings</span>
    </div>
    <div class="preview-scroll">
      <div class="preview-sheet" id="previewSheet"></div>
    </div>
  </section>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="previewModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">📧 Booking Confirmation — Email Preview</span>
      <button class="modal-close" onclick="closePreview()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-email-sheet" id="modalSheet"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const themes = [
  {
    name: 'Sky',
    outerBg: '#e8f4fd', accent: '#1a6faf', borderColor: '#1a6faf',
    text: '#2c2c2c', labelColor: '#aaaaaa',
  },
  {
    name: 'Slate',
    outerBg: '#edf0f4', accent: '#2980b9', borderColor: '#2c3e50',
    text: '#2c3e50', labelColor: '#9eaab8',
  },
  {
    name: 'Emerald',
    outerBg: '#e6f4f1', accent: '#00897b', borderColor: '#00897b',
    text: '#1a2e2b', labelColor: '#8ab5af',
  },
  {
    name: 'Rose',
    outerBg: '#fdeef0', accent: '#c0392b', borderColor: '#c0392b',
    text: '#2e1a1a', labelColor: '#c4a0a0',
  },
  {
    name: 'Plum',
    outerBg: '#f0eaf6', accent: '#6c3483', borderColor: '#6c3483',
    text: '#2a1a35', labelColor: '#b09abe',
  },
  {
    name: 'Warm',
    outerBg: '#fdf6ec', accent: '#d35400', borderColor: '#d35400',
    text: '#2e200e', labelColor: '#c4a882',
  },
];

let state = { ...themes[0], font: "'Inter', Helvetica, Arial, sans-serif" };

/* THEME CARDS */
const grid = document.getElementById('themeGrid');
themes.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'theme-card' + (i === 0 ? ' active' : '');
  card.innerHTML = `
    <div class="theme-swatch" style="background:${t.outerBg}">
      <div class="mini-email" style="background:#ffffff">
        <div class="mini-top" style="background:${t.accent}"></div>
        <div class="mini-body">
          <div class="mini-line" style="background:${t.labelColor};width:70%"></div>
          <div class="mini-line" style="background:${t.accent};width:50%"></div>
          <div class="mini-line" style="background:${t.labelColor};width:85%"></div>
          <div class="mini-line" style="background:${t.labelColor};width:60%"></div>
        </div>
      </div>
    </div>
    <div class="theme-name">${t.name}</div>
  `;
  card.addEventListener('click', () => {
    document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    state = { ...state, ...t };
    syncPickers();
    renderPreview();
  });
  grid.appendChild(card);
});

/* PICKERS */
function syncPickers() {
  document.getElementById('cBg').value = state.outerBg;
  document.getElementById('cAccent').value = state.accent;
  document.getElementById('cText').value = state.text;
  document.getElementById('cLabel').value = state.labelColor;
  document.getElementById('cBorder').value = state.borderColor;
}
document.getElementById('cBg').addEventListener('input', e => { state.outerBg = e.target.value; renderPreview(); });
document.getElementById('cAccent').addEventListener('input', e => { state.accent = e.target.value; renderPreview(); });
document.getElementById('cText').addEventListener('input', e => { state.text = e.target.value; renderPreview(); });
document.getElementById('cLabel').addEventListener('input', e => { state.labelColor = e.target.value; renderPreview(); });
document.getElementById('cBorder').addEventListener('input', e => { state.borderColor = e.target.value; renderPreview(); });
document.getElementById('fontSel').addEventListener('change', e => { state.font = e.target.value; renderPreview(); });

/* BUILD EMAIL HTML */
function buildHTML() {
  const { outerBg, accent, text, labelColor: lc, borderColor: bc, font: f } = state;
  const card = `border:2px solid ${bc};border-radius:12px;background:#ffffff;overflow:hidden;`;
  return `<table style="border-collapse:collapse;width:100%;background:${outerBg};" border="0" cellspacing="0" cellpadding="0">
<tbody><tr><td style="padding:28px 24px;" align="center">
<table style="border-collapse:collapse;width:100%;max-width:540px;border:2px solid ${bc};border-radius:14px;overflow:hidden;" border="0" cellspacing="0" cellpadding="0">
<tbody>

<!-- CARD 1: HEADER -->
<tr><td style="padding-bottom:14px;">
  <table style="${card}" border="0" cellspacing="0" cellpadding="0" width="100%"><tbody>
  <tr><td style="padding:28px 36px 24px 36px;" align="center">
    <span style="font-family:${f};font-size:22px;font-weight:800;color:${accent};letter-spacing:-0.3px;">{agency.company}</span>
  </td></tr>
  <tr><td style="padding:0 36px 8px 36px;" align="center">
    <span style="font-family:${f};font-size:14px;color:${text};line-height:1.6;">Here's everything you need for your booking.</span>
  </td></tr>
  <tr><td style="padding:0 36px 20px 36px;" align="center">
    <span style="font-family:${f};font-size:13px;color:${lc};">Hello <strong style="color:${text};">{reservation.billing_info.contact_name}</strong></span>
  </td></tr>
  <tr><td style="padding:0 36px 6px 36px;" align="center">
    <span style="font-family:${f};font-size:11px;color:${lc};letter-spacing:0.08em;">Booking confirmation reference</span>
  </td></tr>
  <tr><td style="padding:0 36px 10px 36px;" align="center">
    <span style="font-family:'Courier New',monospace;font-size:22px;font-weight:700;color:${text};letter-spacing:0.14em;">{reservation.remote_system_reference}</span>
  </td></tr>
  <tr><td style="padding:0 36px 24px 36px;" align="center">
    <span style="font-family:${f};font-size:13px;color:${accent};font-weight:600;">{viewtrip_link}</span>
  </td></tr>
  </tbody></table>
</td></tr>

<!-- CARD 2: CUSTOMER -->
<tr><td style="padding-bottom:14px;">
  <table style="${card}" border="0" cellspacing="0" cellpadding="0" width="100%"><tbody>
  <tr><td style="padding:18px 28px 12px 28px;">
    <span style="font-family:${f};font-size:12px;font-weight:700;color:${accent};">Customer</span>
  </td></tr>
  <tr><td style="padding:0 28px 18px 28px;">
    <table style="border-collapse:collapse;width:100%;" border="0" cellspacing="0" cellpadding="0"><tbody>
    <tr>
      <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;width:44%;"><span style="font-family:${f};font-size:12px;color:${lc};">Name and Surname</span></td>
      <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;"><span style="font-family:${f};font-size:13px;color:${text};font-weight:500;">{reservation.billing_info.contact_name}</span></td>
    </tr>
    <tr>
      <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;"><span style="font-family:${f};font-size:12px;color:${lc};">Phone</span></td>
      <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;"><span style="font-family:${f};font-size:13px;color:${text};font-weight:500;">{reservation.billing_info.phone}</span></td>
    </tr>
    <tr>
      <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;"><span style="font-family:${f};font-size:12px;color:${lc};">E-mail</span></td>
      <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;"><span style="font-family:${f};font-size:13px;color:${text};font-weight:500;">{reservation.billing_info.email}</span></td>
    </tr>
    <tr>
      <td style="padding:8px 0;"><span style="font-family:${f};font-size:12px;color:${lc};">Username</span></td>
      <td style="padding:8px 0;"><span style="font-family:${f};font-size:13px;color:${text};font-weight:500;">{customer.reservation_creator_info}</span></td>
    </tr>
    </tbody></table>
  </td></tr>
  </tbody></table>
</td></tr>

<!-- CARD 3: BOOKING DETAILS -->
<tr><td style="padding-bottom:14px;">
  <table style="${card}" border="0" cellspacing="0" cellpadding="0" width="100%"><tbody>
  <tr><td style="padding:18px 28px 12px 28px;">
    <span style="font-family:${f};font-size:12px;font-weight:700;color:${accent};">Booking Details</span>
  </td></tr>
  <tr><td style="padding:0 28px 18px 28px;">
    <table style="border-collapse:collapse;width:100%;" border="0" cellspacing="0" cellpadding="0"><tbody>
    <tr>
      <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;width:44%;"><span style="font-family:${f};font-size:12px;color:${lc};">Delivery Method</span></td>
      <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;"><span style="font-family:${f};font-size:13px;color:${text};font-weight:500;">{reservation.ticketplace}</span></td>
    </tr>
    <tr>
      <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;"><span style="font-family:${f};font-size:12px;color:${lc};">Payment Method</span></td>
      <td style="padding:8px 0;border-bottom:1px solid #f0f0f0;"><span style="font-family:${f};font-size:13px;color:${text};font-weight:500;">{reservation.paymentform}</span></td>
    </tr>
    <tr>
      <td style="padding:8px 0;"><span style="font-family:${f};font-size:12px;color:${lc};">Customer's Remark</span></td>
      <td style="padding:8px 0;"><span style="font-family:${f};font-size:13px;color:${text};font-weight:500;">{reservation.remark}</span></td>
    </tr>
    </tbody></table>
  </td></tr>
  </tbody></table>
</td></tr>

<!-- FOOTER (no card) -->
<tr><td style="padding:6px 8px 8px 8px;">
  <span style="font-family:${f};font-size:12px;color:${lc};line-height:1.7;">Please find other details attached. If you have any inquiries, please contact us.</span><br><br>
  <span style="font-family:${f};font-size:12px;font-weight:700;color:${text};">{agency.company}</span><br>
  <span style="font-family:${f};font-size:12px;color:${lc};">{agency.street}, {agency.postal_code} {agency.city}, {agency.country}</span><br>
  <span style="font-family:${f};font-size:12px;color:${accent};">{agency.email} · {agency.phone}</span>
</td></tr>

</tbody></table>
</td></tr></tbody></table>`;
}

/* RENDER LIVE PREVIEW */
function renderPreview() {
  document.getElementById('previewSheet').innerHTML = buildHTML();
}

/* MODAL PREVIEW */
function openPreview() {
  document.getElementById('modalSheet').innerHTML = buildHTML();
  document.getElementById('previewModal').classList.add('open');
}
function closePreview() {
  document.getElementById('previewModal').classList.remove('open');
}
document.getElementById('previewModal').addEventListener('click', function(e) {
  if (e.target === this) closePreview();
});

/* EXPORT */
function copyHTML() {
  navigator.clipboard.writeText(buildHTML()).then(() => toast('Copied!'));
}
function downloadHTML() {
  const blob = new Blob([buildHTML()], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'booking-confirmation.html';
  a.click();
  toast('Downloaded!');
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

syncPickers();
renderPreview();
</script>
</body>
</html>
