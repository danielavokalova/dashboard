<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notification Designer</title>
<style>
:root {
  --ink: #1f2a2a;
  --blue-muted: #4f6a6c;
  --blue-line: #425c5e;
  --tile-bg: rgba(245,246,244,0.9);
  --tile-shadow: rgba(90,115,115,0.35);
  --octopus: #8f3e4a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: "Segoe UI", system-ui, sans-serif;
  background: url("botanicus.png") repeat;
  color: var(--ink);
}

/* ── HEADER ── */
header { padding: 28px 56px 18px; }
.header-row { display: flex; align-items: center; gap: 22px; }
h1 { font-size: 22px; letter-spacing: 0.28em; font-weight: 500; color: var(--blue-muted); }
.divider { height: 2px; background: var(--blue-line); margin-top: 14px; }
.logo-chobotnice { color: var(--octopus); width: 46px; height: 46px; flex-shrink: 0; }
.back-link {
  margin-left: auto;
  font-size: 11px; letter-spacing: 0.18em;
  color: var(--blue-muted); text-decoration: none;
  text-transform: uppercase; opacity: 0.65;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

/* ── LAYOUT ── */
main {
  flex: 1;
  display: grid;
  grid-template-columns: 330px 1fr;
  gap: 28px;
  padding: 28px 56px 44px;
}

/* ── PANELS ── */
.controls { display: flex; flex-direction: column; gap: 18px; }

.panel {
  background: var(--tile-bg);
  border-radius: 20px;
  padding: 20px 22px;
  box-shadow: 0 8px 24px var(--tile-shadow);
  backdrop-filter: blur(4px);
}

.panel-title {
  font-size: 10px; letter-spacing: 0.26em; font-weight: 700;
  color: var(--blue-muted); text-transform: uppercase;
  margin-bottom: 15px;
}

/* ── THEME GALLERY ── */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
}

.theme-card {
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  border: 3px solid transparent;
  transition: border-color 0.2s, transform 0.18s, box-shadow 0.18s;
  box-shadow: 0 3px 12px rgba(0,0,0,0.14);
}
.theme-card:hover { transform: translateY(-3px); box-shadow: 0 8px 22px rgba(0,0,0,0.22); }
.theme-card.active { border-color: var(--blue-line); }

.theme-swatch {
  height: 56px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}

/* mini email shape inside swatch */
.mini-email {
  width: 44px; height: 36px;
  border-radius: 4px;
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.mini-header { height: 12px; width: 100%; }
.mini-rows { padding: 3px 4px; display: flex; flex-direction: column; gap: 2px; }
.mini-row { height: 2px; border-radius: 1px; background: #ddd; }
.mini-row.accent { width: 60%; }

.theme-label {
  background: rgba(255,255,255,0.82);
  text-align: center;
  font-size: 9px; letter-spacing: 0.14em; font-weight: 700;
  color: #444; padding: 5px 0;
  text-transform: uppercase;
}

/* ── CONTROLS ── */
.control-row {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 13px;
}
.control-row:last-child { margin-bottom: 0; }

.control-label { font-size: 12px; color: var(--ink); opacity: 0.75; }

input[type="color"] {
  width: 42px; height: 28px;
  border: none; border-radius: 8px;
  cursor: pointer; padding: 2px;
  background: transparent;
}

select {
  font-family: inherit; font-size: 12px; color: var(--ink);
  background: rgba(255,255,255,0.72);
  border: 1px solid rgba(66,92,94,0.28);
  border-radius: 8px; padding: 5px 8px;
  cursor: pointer; outline: none;
}

/* ── BUTTONS ── */
.btn {
  width: 100%; padding: 11px;
  border: none; border-radius: 12px;
  font-family: inherit; font-size: 11px;
  letter-spacing: 0.18em; font-weight: 700;
  text-transform: uppercase; cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
  margin-bottom: 9px;
}
.btn:last-child { margin-bottom: 0; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.16); }
.btn:active { transform: translateY(0); }

.btn-primary { background: var(--blue-line); color: white; }
.btn-secondary {
  background: rgba(255,255,255,0.68);
  color: var(--blue-muted);
  border: 1px solid rgba(66,92,94,0.28);
}

/* ── PREVIEW AREA ── */
.preview-area { display: flex; flex-direction: column; gap: 10px; }

.preview-label {
  font-size: 10px; letter-spacing: 0.26em; font-weight: 700;
  color: var(--blue-muted); text-transform: uppercase;
}

.preview-frame-wrap {
  flex: 1;
  background: var(--tile-bg);
  border-radius: 20px;
  box-shadow: 0 8px 24px var(--tile-shadow);
  backdrop-filter: blur(4px);
  overflow: hidden;
  display: flex; flex-direction: column;
  min-height: 580px;
}

.preview-topbar {
  background: rgba(66,92,94,0.08);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid rgba(66,92,94,0.12);
  flex-shrink: 0;
}
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }
.topbar-label {
  margin-left: 8px; font-size: 11px;
  color: var(--blue-muted); opacity: 0.6; letter-spacing: 0.06em;
}

iframe#preview { flex: 1; border: none; width: 100%; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--blue-line); color: white;
  padding: 11px 26px; border-radius: 30px;
  font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; font-weight: 700;
  box-shadow: 0 8px 24px rgba(0,0,0,0.22);
  transition: transform 0.3s ease;
  pointer-events: none; z-index: 100;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <svg class="logo-chobotnice" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="40" r="25" fill="currentColor"/>
      <g fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round">
        <path d="M50 65 C45 75 55 85 50 95"/>
        <path d="M40 63 C30 75 45 85 35 95"/>
        <path d="M60 63 C70 75 55 85 65 95"/>
        <path d="M30 58 C15 70 35 85 20 92"/>
        <path d="M70 58 C85 70 65 85 80 92"/>
      </g>
      <g fill="white">
        <circle cx="42" cy="40" r="3.5"/>
        <circle cx="58" cy="40" r="3.5"/>
      </g>
    </svg>
    <h1>NOTIFICATION DESIGNER</h1>
    <a class="back-link" href="index.html">← Dashboard</a>
  </div>
  <div class="divider"></div>
</header>

<main>

  <aside class="controls">

    <!-- THEMES -->
    <div class="panel">
      <div class="panel-title">Choose a Theme</div>
      <div class="theme-grid" id="themeGrid"></div>
    </div>

    <!-- CUSTOMISE -->
    <div class="panel">
      <div class="panel-title">Fine-tune</div>
      <div class="control-row">
        <span class="control-label">Background</span>
        <input type="color" id="cBg">
      </div>
      <div class="control-row">
        <span class="control-label">Accent colour</span>
        <input type="color" id="cAccent">
      </div>
      <div class="control-row">
        <span class="control-label">Text colour</span>
        <input type="color" id="cText">
      </div>
      <div class="control-row">
        <span class="control-label">Font</span>
        <select id="fontSel">
          <option value="'Inter', Helvetica, Arial, sans-serif">Inter</option>
          <option value="Muli, Helvetica, Arial, sans-serif">Muli</option>
          <option value="Georgia, 'Times New Roman', serif">Georgia</option>
          <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
          <option value="Verdana, Geneva, sans-serif">Verdana</option>
          <option value="'Courier New', monospace">Courier New</option>
        </select>
      </div>
    </div>

    <!-- EXPORT -->
    <div class="panel">
      <div class="panel-title">Export</div>
      <button class="btn btn-primary" onclick="copyHTML()">Copy HTML</button>
      <button class="btn btn-secondary" onclick="downloadHTML()">Download HTML</button>
    </div>

  </aside>

  <section class="preview-area">
    <div class="preview-label">Live Preview</div>
    <div class="preview-frame-wrap">
      <div class="preview-topbar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <span class="topbar-label">Booking Confirmation — email preview</span>
      </div>
      <iframe id="preview"></iframe>
    </div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>
const themes = [
  {
    name: 'Glacier',
    outerBg: '#dff0f5',
    innerBg: '#ffffff',
    headerStripe: '#006d77',
    accent: '#006d77',
    titleColor: '#004d40',
    sectionLabel: '#006d77',
    text: '#2d3a3a',
    footerMsg: '#006d77',
    footerGrey: '#5a7a7a',
    rowBorder: '#b2dfdb',
  },
  {
    name: 'Midnight',
    outerBg: '#12112e',
    innerBg: '#1e1d40',
    headerStripe: '#7b5ea7',
    accent: '#c084fc',
    titleColor: '#e0d8ff',
    sectionLabel: '#a78bfa',
    text: '#c4c0e0',
    footerMsg: '#a5b4fc',
    footerGrey: '#9090b8',

  },
  {

    headerStripe: '#c2185b',
    accent: '#ad1457',

    sectionLabel: '#c2185b',
    text: '#4a2030',
    footerMsg: '#880e4f',
    footerGrey: '#a06070',
    rowBorder: '#f8bbd0',
  },
  {
    name: 'Ember',
    outerBg: '#fff0e0',
    innerBg: '#ffffff',
    headerStripe: '#e65100',
    accent: '#d84315',
    titleColor: '#bf360c',
    sectionLabel: '#e65100',
    text: '#4e2e1e',
    footerMsg: '#bf360c',
    footerGrey: '#8d6050',
    rowBorder: '#ffe0c0',
  },
  {
    name: 'Amethyst',
    outerBg: '#ede7f6',
    innerBg: '#ffffff',
    headerStripe: '#4527a0',
    accent: '#4527a0',
    titleColor: '#311b92',
    sectionLabel: '#5e35b1',
    text: '#2e1b6a',
    footerMsg: '#311b92',
    footerGrey: '#7e57c2',
    rowBorder: '#d1c4e9',
  },
  {
    name: 'Carbon',
    outerBg: '#1c1c1e',
    innerBg: '#2a2a2c',
    headerStripe: '#ff9f0a',
    accent: '#ff9f0a',
    titleColor: '#f5f5f7',
    sectionLabel: '#ff9f0a',
    text: '#c8c8cc',
    footerMsg: '#ebebf5',
    footerGrey: '#8e8e93',
    rowBorder: '#3a3a3c',
  },
];

let state = { ...themes[0], font: "'Inter', Helvetica, Arial, sans-serif" };

/* ── BUILD THEME CARDS ── */
const grid = document.getElementById('themeGrid');
themes.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'theme-card' + (i === 0 ? ' active' : '');

  const isDark = isDarkColor(t.outerBg);

  card.innerHTML = `
    <div class="theme-swatch" style="background:${t.outerBg}">
      <div class="mini-email" style="background:${t.innerBg}">
        <div class="mini-header" style="background:${t.headerStripe}"></div>
        <div class="mini-rows">
          <div class="mini-row" style="background:${isDark ? 'rgba(255,255,255,0.15)' : '#e0e0e0'}; width:70%"></div>
          <div class="mini-row accent" style="background:${t.accent}"></div>
          <div class="mini-row" style="background:${isDark ? 'rgba(255,255,255,0.1)' : '#e8e8e8'}"></div>
          <div class="mini-row" style="background:${isDark ? 'rgba(255,255,255,0.1)' : '#e8e8e8'}; width:50%"></div>
        </div>
      </div>
    </div>
    <div class="theme-label">${t.name}</div>
  `;

  card.addEventListener('click', () => {
    document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    state = { ...state, ...t };
    syncPickers();
    renderPreview();
  });

  grid.appendChild(card);
});

function isDarkColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 < 128;
}

/* ── PICKERS ── */
function syncPickers() {
  document.getElementById('cBg').value = state.outerBg;
  document.getElementById('cAccent').value = state.accent;
  document.getElementById('cText').value = state.text;
}

document.getElementById('cBg').addEventListener('input', e => { state.outerBg = e.target.value; renderPreview(); });
document.getElementById('cAccent').addEventListener('input', e => {
  state.accent = e.target.value;
  state.headerStripe = e.target.value;
  state.sectionLabel = e.target.value;
  renderPreview();
});
document.getElementById('cText').addEventListener('input', e => { state.text = e.target.value; renderPreview(); });
document.getElementById('fontSel').addEventListener('change', e => { state.font = e.target.value; renderPreview(); });

<tbody>
<tr>
<td style="vertical-align:top;padding-bottom:10px;text-align:center;" valign="top">
  <span style="font-family:${f};color:${titleColor};font-size:28px;font-weight:700;letter-spacing:0.04em;">Booking Confirmation</span>
</td>
</tr>
<tr>
<td style="font-family:${f};text-align:center;padding-bottom:6px;">
  <span style="font-family:${f};color:${titleColor};font-size:14px;opacity:0.75;">Your Booking Reference:&nbsp;</span><span style="font-family:${f};color:${accent};font-weight:700;font-size:16px;">{reservation.remote_system_reference}</span>
</td>

<tbody>

<tr>
<td colspan="2" style="vertical-align:top;padding:24px 8px 10px 8px;" valign="top">
  <span style="font-family:${f};font-weight:700;color:${sectionLabel};font-size:11px;letter-spacing:0.2em;text-transform:uppercase;border-bottom:2px solid ${sectionLabel};padding-bottom:4px;">Customer</span>
</td>
</tr>

/* ── RENDER ── */
function renderPreview() {
  const isDark = isDarkColor(state.outerBg);
  const pageBg = isDark ? '#0e0e10' : '#f0f0f0';
  const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
<style>body{margin:0;padding:24px 0;background:${pageBg};}</style>
</head><body>${buildHTML()}</body></html>`;
  document.getElementById('preview').srcdoc = doc;
}

/* ── EXPORT ── */
function copyHTML() {
  navigator.clipboard.writeText(buildHTML()).then(() => toast('Copied to clipboard!'));
}
function downloadHTML() {
  const blob = new Blob([buildHTML()], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'booking-confirmation.html';
  a.click();
  toast('Downloaded!');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

/* ── INIT ── */
syncPickers();
renderPreview();
</script>
