<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace 2026 — Live Data</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4efe5;--card:#faf7f1;--border:rgba(150,130,95,.16);--shadow:rgba(100,80,50,.09);
  --text:#251e12;--muted:#897660;--teal:#1e8c76;--rose:#b34358;--amber:#b87018;
  --blue:#2d6aa0;--green:#2e7a46;--row-alt:rgba(244,239,229,.55);--row-hov:rgba(30,140,118,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:22px 24px;font-size:13px;}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 60% 40% at 10% 8%,rgba(30,140,118,.07) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 90% 90%,rgba(45,106,160,.07) 0%,transparent 65%);pointer-events:none;}
.hd{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 22px;margin-bottom:16px;box-shadow:0 2px 14px var(--shadow);gap:12px;flex-wrap:wrap;}
.hd-left{display:flex;align-items:center;gap:12px}
.hd-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#1e8c76,#2d6aa0);display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 3px 12px rgba(30,140,118,.28);flex-shrink:0;}
.hd h1{font-size:1.25rem;font-weight:800;letter-spacing:-.02em}
.hd p{font-size:.76rem;color:var(--muted);margin-top:2px}
.btn-refresh{display:inline-flex;align-items:center;gap:7px;background:var(--teal);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:.8rem;font-weight:700;cursor:pointer;transition:opacity .15s;letter-spacing:.02em;}
.btn-refresh:hover{opacity:.85}.btn-refresh:disabled{opacity:.5;cursor:not-allowed}
.progress-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;box-shadow:0 2px 10px var(--shadow);display:none;}
.progress-wrap.show{display:block}
.progress-label{font-size:.8rem;color:var(--muted);margin-bottom:8px;font-weight:500}
.progress-bar-bg{height:8px;background:rgba(150,130,95,.15);border-radius:99px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:99px;transition:width .3s ease;width:0%;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:0 2px 10px var(--shadow);position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
.kpi.c-teal::before{background:var(--teal)}.kpi.c-blue::before{background:var(--blue)}.kpi.c-amber::before{background:var(--amber)}.kpi.c-rose::before{background:var(--rose)}.kpi.c-green::before{background:var(--green)}
.kpi-val{font-size:1.5rem;font-weight:800;letter-spacing:-.025em;line-height:1;margin-top:4px}
.kpi.c-teal .kpi-val{color:var(--teal)}.kpi.c-blue .kpi-val{color:var(--blue)}.kpi.c-amber .kpi-val{color:var(--amber)}.kpi.c-rose .kpi-val{color:var(--rose)}.kpi.c-green .kpi-val{color:var(--green)}
.kpi-lbl{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 12px var(--shadow);overflow:hidden;}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.card-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fg{border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:.78rem;font-family:inherit;background:#fff;color:var(--text);outline:none;}
.fg:focus{border-color:var(--teal)}
.card-count{font-size:.75rem;color:var(--muted)}
.tbl-wrap{overflow-x:auto;max-height:62vh;overflow-y:auto}
table{border-collapse:collapse;width:100%;font-size:.78rem}
thead th{position:sticky;top:0;z-index:2;background:#f0ebe0;border-bottom:1px solid var(--border);padding:8px 10px;text-align:left;font-weight:700;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;}
thead th:hover{color:var(--text)}
thead th.sort-asc::after{content:' ↑'}thead th.sort-desc::after{content:' ↓'}
tbody tr{border-bottom:1px solid rgba(150,130,95,.08);transition:background .1s}
tbody tr:nth-child(even){background:var(--row-alt)}tbody tr:hover{background:var(--row-hov)}
td{padding:6px 10px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
td.num{text-align:right;font-variant-numeric:tabular-nums}
.status-pill{display:inline-block;padding:2px 7px;border-radius:99px;font-size:.68rem;font-weight:700;letter-spacing:.03em;}
.s-ISSUED{background:#dcfce7;color:#166534}.s-ACTIVE{background:#dbeafe;color:#1e40af}.s-CANCELED{background:#fee2e2;color:#991b1b}.s-REJECTED{background:#fef9c3;color:#854d0e}.s-UNSUCCESSFUL{background:#f3f4f6;color:#6b7280}
.empty{padding:48px;text-align:center;color:var(--muted);font-size:.85rem}
footer{margin-top:16px;text-align:center;font-size:.68rem;color:var(--muted);opacity:.6}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-left">
    <div class="hd-icon">📊</div>
    <div>
      <h1>Rezervace 2026 — Live Data</h1>
      <p id="hd-sub">Klikněte Aktualizovat pro načtení dat z Google Sheets</p>
    </div>
  </div>
  <button class="btn-refresh" id="btnRefresh" onclick="loadData()">↻ Aktualizovat</button>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-label" id="progressLabel">Načítám…</div>
  <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
</div>

<div class="kpi-row">
  <div class="kpi c-teal"><div class="kpi-lbl">Celkem záznamů</div><div class="kpi-val" id="kTotal">—</div></div>
  <div class="kpi c-blue"><div class="kpi-lbl">Cestující</div><div class="kpi-val" id="kTravelers">—</div></div>
  <div class="kpi c-green"><div class="kpi-lbl">Vydáno (ISSUED)</div><div class="kpi-val" id="kIssued">—</div></div>
  <div class="kpi c-rose"><div class="kpi-lbl">Stornováno</div><div class="kpi-val" id="kCanceled">—</div></div>
  <div class="kpi c-amber"><div class="kpi-lbl">Průměrná cena CZK</div><div class="kpi-val" id="kAvgPrice">—</div></div>
</div>

<div class="card">
  <div class="card-header">
    <span class="card-title">Záznamy od 1. 1. 2026</span>
    <div class="filters">
      <input class="fg" type="search" id="search" placeholder="Hledat…" oninput="renderTable()">
      <select class="fg" id="fStatus" onchange="renderTable()"><option value="">Všechny statusy</option></select>
      <select class="fg" id="fAgency" onchange="renderTable()"><option value="">Všechny agentury</option></select>
      <span class="card-count" id="rowCount"></span>
    </div>
  </div>
  <div class="tbl-wrap">
    <table id="mainTable">
      <thead id="thead"></thead>
      <tbody id="tbody"><tr><td colspan="99" class="empty">Klikněte ↻ Aktualizovat pro načtení dat.</td></tr></tbody>
    </table>
  </div>
</div>

<footer>Zdroj: Google Sheets · Filtrováno od 1. 1. 2026 · <span id="lastUpdate"></span></footer>

<script>
const COLS = [
  {key:'Reservation date', label:'Datum'},
  {key:'Locator',          label:'Locator'},
  {key:'Status',           label:'Status'},
  {key:'Agency',           label:'Agentura'},
  {key:'Traveler (excluding infants)', label:'Ces.', cls:'num'},
  {key:'From',             label:'Odkud'},
  {key:'Where',            label:'Kam'},
  {key:'Type',             label:'Typ'},
  {key:'Total Price',      label:'Cena', cls:'num'},
  {key:'Currency',         label:'Měna'},
  {key:'Connector',        label:'Konektor'},
  {key:'Last Status',      label:'Poslední stav'},
];

let allRows = [], sortCol = 'Reservation date', sortDir = -1;

async function loadData() {
  const btn = document.getElementById('btnRefresh');
  const wrap = document.getElementById('progressWrap');
  const bar  = document.getElementById('progressBar');
  const lbl  = document.getElementById('progressLabel');
  btn.disabled = true;
  wrap.classList.add('show');
  bar.style.width = '2%';
  lbl.textContent = 'Připojuji se ke Google Sheets…';
  allRows = [];

  try {
    const res = await fetch('/api/gsheet-stream');
    if (!res.ok) throw new Error('Server odpověděl: ' + res.status);
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '', total = 0;

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream: true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.trim()) continue;
        try {
          const obj = JSON.parse(line);
          if (obj.error)    { lbl.textContent = 'Chyba: ' + obj.error; continue; }
          if (obj.done)     { bar.style.width = '100%'; continue; }
          if (obj.total && !obj.progress) { total = obj.total; continue; }
          if (obj.progress) {
            const pct = total ? Math.round(obj.progress/total*100) : 0;
            bar.style.width = Math.max(pct,2) + '%';
            lbl.textContent = `Načítám… ${obj.progress.toLocaleString('cs-CZ')} / ${total.toLocaleString('cs-CZ')} (${pct} %)`;
            continue;
          }
          allRows.push(obj);
        } catch {}
      }
    }
  } catch(e) {
    document.getElementById('progressLabel').textContent = 'Chyba připojení: ' + e.message;
  }

  btn.disabled = false;
  buildFilters(); updateKPIs(); renderTable();
  document.getElementById('lastUpdate').textContent = 'Aktualizováno: ' + new Date().toLocaleString('cs-CZ');
  document.getElementById('hd-sub').textContent = allRows.length.toLocaleString('cs-CZ') + ' záznamů · 1. 1. 2026 – dnes · Google Sheets';
  document.getElementById('progressLabel').textContent = 'Hotovo — načteno ' + allRows.length.toLocaleString('cs-CZ') + ' záznamů od 1. 1. 2026';
}

function buildFilters() {
  const ss = [...new Set(allRows.map(r=>r['Status']).filter(Boolean))].sort();
  const as = [...new Set(allRows.map(r=>r['Agency']).filter(Boolean))].sort();
  document.getElementById('fStatus').innerHTML = '<option value="">Všechny statusy</option>' + ss.map(s=>`<option>${s}</option>`).join('');
  document.getElementById('fAgency').innerHTML = '<option value="">Všechny agentury</option>' + as.map(a=>`<option>${a}</option>`).join('');
}

function updateKPIs() {
  document.getElementById('kTotal').textContent     = allRows.length.toLocaleString('cs-CZ');
  document.getElementById('kTravelers').textContent = allRows.reduce((s,r)=>s+parseInt(r['Traveler (excluding infants)']||0),0).toLocaleString('cs-CZ');
  document.getElementById('kIssued').textContent    = allRows.filter(r=>r['Status']==='ISSUED').length.toLocaleString('cs-CZ');
  document.getElementById('kCanceled').textContent  = allRows.filter(r=>r['Status']==='CANCELED').length.toLocaleString('cs-CZ');
  const czk = allRows.filter(r=>r['Currency']==='CZK' && parseFloat(r['Total Price'])>0);
  const avg = czk.length ? czk.reduce((s,r)=>s+parseFloat(r['Total Price']),0)/czk.length : 0;
  document.getElementById('kAvgPrice').textContent  = avg ? Math.round(avg).toLocaleString('cs-CZ') : '—';
}

function getFiltered() {
  const q=document.getElementById('search').value.toLowerCase();
  const fS=document.getElementById('fStatus').value;
  const fA=document.getElementById('fAgency').value;
  return allRows.filter(r=>{
    if(fS && r['Status']!==fS) return false;
    if(fA && r['Agency']!==fA) return false;
    if(q){const hay=COLS.map(c=>r[c.key]||'').join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  }).sort((a,b)=>{const av=a[sortCol]||'',bv=b[sortCol]||'';return av<bv?sortDir:av>bv?-sortDir:0;});
}

function renderTable() {
  const rows = getFiltered();
  document.getElementById('rowCount').textContent = rows.length.toLocaleString('cs-CZ') + ' záznamů';
  const thead = document.getElementById('thead');
  if (!thead.children.length) {
    const tr = document.createElement('tr');
    COLS.forEach(c=>{
      const th = document.createElement('th');
      th.textContent = c.label; th.dataset.key = c.key;
      th.onclick=()=>{
        if(sortCol===c.key)sortDir*=-1;else{sortCol=c.key;sortDir=-1;}
        document.querySelectorAll('thead th').forEach(t=>t.classList.remove('sort-asc','sort-desc'));
        th.classList.add(sortDir===-1?'sort-desc':'sort-asc');
        renderTable();
      };
      if(sortCol===c.key)th.classList.add(sortDir===-1?'sort-desc':'sort-asc');
      tr.appendChild(th);
    });
    thead.appendChild(tr);
  }
  const tbody = document.getElementById('tbody');
  if (!rows.length){tbody.innerHTML='<tr><td colspan="99" class="empty">Žádné záznamy.</td></tr>';return;}
  const PAGE=500, frag=document.createDocumentFragment();
  rows.slice(0,PAGE).forEach(row=>{
    const tr=document.createElement('tr');
    COLS.forEach(c=>{
      const td=document.createElement('td');
      if(c.cls)td.className=c.cls;
      if(c.key==='Status'){
        const sp=document.createElement('span');
        sp.className='status-pill s-'+(row[c.key]||'').replace(/\s/g,'');
        sp.textContent=row[c.key]||'';td.appendChild(sp);
      } else if(c.key==='Total Price'&&row[c.key]){
        td.textContent=parseFloat(row[c.key]).toLocaleString('cs-CZ',{maximumFractionDigits:0});
      } else {td.textContent=row[c.key]||'';td.title=row[c.key]||'';}
      tr.appendChild(td);
    });
    frag.appendChild(tr);
  });
  if(rows.length>PAGE){
    const tr=document.createElement('tr');const td=document.createElement('td');
    td.colSpan=COLS.length;td.className='empty';
    td.textContent=`… zobrazeno ${PAGE.toLocaleString('cs-CZ')} z ${rows.length.toLocaleString('cs-CZ')} záznamů — zpřesněte filtr.`;
    tr.appendChild(td);frag.appendChild(tr);
  }
  tbody.innerHTML='';tbody.appendChild(frag);
}
</script>
</body>
</html>
